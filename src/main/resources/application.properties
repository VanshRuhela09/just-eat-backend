spring.application.name=just-eat-backend

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/justeatdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=${SERVER_PORT:8081}
server.servlet.context-path=/api

# JWT configuration
jwt.secret=${JWT_SECRET:justeat_super_secret_key_which_is_at_least_32_chars_long!}
jwt.expiration=604800000

# Password Reset Token configuration
password-reset.token.expiration-minutes=30

# Mail configuration (configure with your SMTP settings)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:justeat996@gmail.com}
spring.mail.password=${MAIL_PASSWORD:ivkkaipygqwpkzdo}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App URL for password reset link
app.frontend-url=${FRONTEND_URLS:http://localhost:5173}

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Popularity Configuration (Mostly Ordered Items)
popularity.minimum-orders=10
popularity.percentile-threshold=75.0
popularity.calculation-days=30
popularity.cron=0 0 2 * * *
