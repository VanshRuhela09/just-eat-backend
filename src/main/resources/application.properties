spring.application.name=${SPRING_APPLICATION_NAME:just-eat-backend}

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/justeatdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

server.port=${SERVER_PORT:8081}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/api}

# JWT configuration
jwt.secret=${JWT_SECRET:justeat_super_secret_key_which_is_at_least_32_chars_long!}
jwt.expiration=${JWT_EXPIRATION:604800000}

# Password Reset Token configuration
password-reset.token.expiration-minutes=${PASSWORD_RESET_TOKEN_EXPIRATION_MINUTES:30}

# Mail configuration (configure with your SMTP settings)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:justeat996@gmail.com}
spring.mail.password=${MAIL_PASSWORD:ivkkaipygqwpkzdo}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}

# App URL for password reset link
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Swagger / OpenAPI
springdoc.api-docs.path=${SPRINGDOC_API_DOCS_PATH:/v3/api-docs}
springdoc.swagger-ui.path=${SPRINGDOC_SWAGGER_UI_PATH:/swagger-ui.html}

# Popularity Configuration (Mostly Ordered Items)
popularity.minimum-orders=${POPULARITY_MINIMUM_ORDERS:10}
popularity.percentile-threshold=${POPULARITY_PERCENTILE_THRESHOLD:75.0}
popularity.calculation-days=${POPULARITY_CALCULATION_DAYS:30}
popularity.cron=${POPULARITY_CRON:0 0 2 * * *}
